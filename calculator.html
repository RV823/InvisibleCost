<!DOCTYPE html>
<html>
<head>
    <title>InvisibleCost</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>💸 Invisible Cost Tracker</h1>

    <!-- Form -->
    <form method="POST" class="form-box">
        <input type="text" name="name" placeholder="Expense name (chai, Netflix...)" required>
        <input type="number" name="amount" placeholder="Amount ₹" required>
        <button type="submit">Add Expense</button>
    </form>

    <!-- Expense List -->
    <div class="card">
        <h2>📋 Your Expenses</h2>
        <ul>
            {% for exp in expenses %}
                <li>{{ exp.name }} - ₹{{ exp.amount }}</li>
            {% endfor %}
        </ul>
    </div>

    <!-- Summary -->
    <div class="card highlight">
        <h2>📊 Summary</h2>
        <p>Daily Total: ₹{{ total_daily }}</p>
        <p>Monthly: ₹{{ monthly }}</p>
        <p>Yearly: ₹{{ yearly }}</p>
        <p class="message">{{ message }}</p>
    </div>

</div>

</body>
</html>
